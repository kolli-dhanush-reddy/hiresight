<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HireSight</title>
    <meta name="description" content="Analyze placement trends, company hiring patterns, and prepare strategically for placements." />
    <meta name="author" content="HireSight" />

    <meta property="og:title" content="HireSight" />
    <meta property="og:description" content="Analyze placement trends, company hiring patterns, and prepare strategically for placements." />
    <meta property="og:type" content="website" />

    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        var stored = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
